<!DOCTYPE html>

<html>

    <head>
        <link rel="stylesheet" type="text/css" href="styles.css">

        <meta charset="utf-8"/>

        <title>Embedded Framework Testing</title>

    </head>

    <body>

        <h1>Embedded Framework Testing</h1>
        <iframe id="softphone" style="width: 400px; height: 500px; border: none;" allow="camera *; microphone *; autoplay *" src="https://apps.usw2.pure.cloud/crm/embeddableFramework.html?enableFrameworkClientId=true"></iframe>
        <iframe id = "embeddedInteraction" style="width: 500px; height: 500px; border: none;" allow="camera *; microphone *; autoplay *; hid *" src="https://apps.usw2.pure.cloud/crm/interaction.html"></iframe>

        <h2>For Click-To-Dial Test</h2>
        
        <ul>
            <li><a href="tel:+13172222222">Call Us: +13172222222 - For browser extensions</a></li>
            <li>
                <button onclick="toggleIframe()">Hide / Show iFrame</button>
                <input type="text" id="phoneNumberInput" placeholder="Enter phone number">
                <button id="clickToDialButton" onclick="performClickToDial()">Click to Dial - For Embedded client</button>
                <button id="GET Presence" onclick="getPresence()">GET Presence</button>
            </li>
        </ul>
        
        <script>
            function toggleIframe() {
                const iframe = document.getElementById("embeddedInteraction");

                if (iframe.style.display === "none") {
                iframe.style.display = "block";
                } else {
                iframe.style.display = "none";
                }
            }
            function getPresence() {
                const message = {type: 'INIT_GENESYS' }
                iframeContentWindow.postMessage(message, "https://apps.usw2.pure.cloud");
            }
            function performClickToDial() {
                const iframeContentWindow = document.querySelector('iframe').contentWindow;
                const phoneNumberInput = document.getElementById('phoneNumberInput');
                const phoneNumber = phoneNumberInput.value;
                const targetDomain = 'https://apps.usw2.pure.cloud';
                const message = {
                    type: 'clickToDial',
                    data: {
                        number: phoneNumber,
                        type: "call",
                        autoPlace: true,
                        queueId: "c03a3d4a-7207-4f8c-bab3-d3f8f015af79",
                        attributes: {"c_data":"{\"m_id\":-1,\"a_id\":287845003,\"u_p\":\"81335222500\"}"}
                    }
                };
                iframeContentWindow.postMessage(message, targetDomain);
                console.log(message)
            }

        </script>
        <script src="https://sdk-cdn.mypurecloud.com/javascript/251.1.0/purecloud-platform-client-v2.min.js"></script>
        
    </body>

</html>
