<!DOCTYPE html>

<html lang="en">
<head>
    <meta charset="utf-8"/>
    <title>Embedded Framework Testing</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <header>
        <h1>Embedded Framework Testing</h1>
    </header>

    <!-- IFRAME SECTION -->
    <section class="iframe-section">
        <div class="iframe-header">
            <h2>Softphone & Interaction Panel</h2>
            <button onclick="toggleInteraction()">Toggle Interaction Panel</button>
        </div>

        <div class="iframe-container">
            <iframe id="softphone"
                allow="camera *; microphone *; autoplay *"
                src="https://apps.usw2.pure.cloud/crm/embeddableFramework.html?enableFrameworkClientId=true">
            </iframe>

            <iframe id="embeddedInteraction"
                allow="camera *; microphone *; autoplay *; hid *"
                src="https://apps.usw2.pure.cloud/crm/interaction.html">
            </iframe>
        </div>
    </section>

    <!-- CLICK TO DIAL SECTION -->
    <section class="card">
        <h2>Click-To-Dial Testing</h2>

        <a href="tel:+13172222222">
            Call Us: +13172222222 (Browser Extension)
        </a>

        <div class="form-group">
            <input type="text" id="phoneNumberInput" placeholder="Enter phone number">
            <button onclick="performClickToDial()">Click to Dial (Embedded)</button>
        </div>
    </section>

    <!-- API TESTING SECTION -->
    <section class="card">
        <h2>API Testing</h2>
        <button onclick="getPresence()">Get Presence</button>

        <div id="apiResult"></div>
    </section>
        
        <script>
            function toggleIframe() {
                const iframe = document.getElementById("embeddedInteraction");

                if (iframe.style.display === "none") {
                iframe.style.display = "block";
                } else {
                iframe.style.display = "none";
                }
            }
            function getPresence() {
                const iframeContentWindow = document.querySelector('iframe').contentWindow;
                const message = {type: 'INIT_GENESYS' }
                iframeContentWindow.postMessage(message, "https://apps.usw2.pure.cloud");
            }
            function performClickToDial() {
                const iframeContentWindow = document.querySelector('iframe').contentWindow;
                const phoneNumberInput = document.getElementById('phoneNumberInput');
                const phoneNumber = phoneNumberInput.value;
                const targetDomain = 'https://apps.usw2.pure.cloud';
                const message = {
                    type: 'clickToDial',
                    data: {
                        number: phoneNumber,
                        type: "call",
                        autoPlace: true,
                        queueId: "c03a3d4a-7207-4f8c-bab3-d3f8f015af79",
                        attributes: {"c_data":"{\"m_id\":-1,\"a_id\":287845003,\"u_p\":\"81335222500\"}"}
                    }
                };
                iframeContentWindow.postMessage(message, targetDomain);
                console.log(message)
            }

        </script>
        <script src="https://sdk-cdn.mypurecloud.com/javascript/251.1.0/purecloud-platform-client-v2.min.js"></script>
        
    </body>

</html>
